services:
  app:
    build: .
    restart: unless-stopped
    networks:
      - jamonoinc-network
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jamonoinc.rule=Host(`jamono.io`) || Host(`www.jamono.io`)"
      - "traefik.http.routers.jamonoinc.entrypoints=websecure"
      - "traefik.http.routers.jamonoinc.tls.certresolver=letsencrypt"
      - "traefik.http.services.jamonoinc.loadbalancer.server.port=80"

networks:
  jamonoinc-network:
  traefik-net:
    external: true
